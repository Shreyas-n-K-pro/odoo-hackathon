version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# TransitOps — Docker Compose (MySQL only)
# Usage: docker compose up -d
# This gives all 4 team members a consistent MySQL 8 instance in one command.
# ─────────────────────────────────────────────────────────────────────────────

services:
  mysql:
    image: mysql:8.0
    container_name: transitops_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: transitops_db
      MYSQL_USER: transitops_user
      MYSQL_PASSWORD: StrongPass123
    ports:
      - "3306:3306"
    volumes:
      - transitops_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  transitops_mysql_data:
    driver: local
